[pytest]
markers =
    smoke: quick tests for critical functionality
    regression: full suite regression tests
    slow: marks tests as slow
    sanity: quick test for fixed issues

addopts = --alluredir=reports/allure-results --clean-alluredir

log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)s] %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S
